<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sriya Mitra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f5f2; --card:#ffffff; --ink:#17150f; --muted:#6c6760;
    --accent:#d6002a; --accent-soft:#fdecef; --accent-ink:#a80122;
    --line:#eae7e1; --shadow:0 1px 2px rgba(20,15,5,.08), 0 10px 26px rgba(20,15,5,.07);
    --shadow-lift:0 6px 14px rgba(20,15,5,.10), 0 22px 50px rgba(20,15,5,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif; -webkit-font-smoothing:antialiased;}
  a{color:inherit}
  .wrap{max-width:1120px; margin:0 auto; padding:40px 22px 64px}

  header.top{margin:6px 6px 26px}
  .kicker{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink); font-weight:600}
  h1{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:clamp(38px,7vw,68px);
     line-height:1.0; letter-spacing:-.01em; margin:8px 0 0}
  h1 .stop{color:var(--accent)}
  .lede{font-family:"Fraunces",Georgia,serif; font-size:clamp(17px,2.4vw,22px); font-weight:500;
        color:#3a352c; margin:14px 0 0; max-width:640px; line-height:1.4}
  .links{margin-top:16px; display:flex; gap:10px; flex-wrap:wrap}
  .links a{font-size:13px; font-weight:600; text-decoration:none; color:var(--ink);
    background:#fff; border:1px solid var(--line); padding:8px 14px; border-radius:999px; box-shadow:var(--shadow)}
  .links a:hover{border-color:#dcd7cf; transform:translateY(-1px)}
  .links a.primary{background:var(--accent); color:#fff; border-color:var(--accent)}

  .board{display:flex; gap:18px; align-items:flex-start}
  .col{flex:1 1 0; min-width:0; display:flex; flex-direction:column; gap:18px}
  @media(max-width:820px){.board{gap:14px} .col{gap:14px}}

  .pin{display:block; width:100%; text-align:left; cursor:pointer; padding:0;
    background:var(--card); border:none; border-radius:20px; overflow:hidden;
    box-shadow:var(--shadow); margin:0;
    transition:transform .18s ease, box-shadow .18s ease; font:inherit; color:inherit}
  .pin:hover{transform:translateY(-3px); box-shadow:var(--shadow-lift)}
  .pin:focus-visible{outline:3px solid var(--accent); outline-offset:2px}
  .pin img{width:100%; display:block; max-height:360px; object-fit:cover; object-position:center}
  .pin .c{padding:13px 15px 15px}
  .pin .t{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:17px; margin:0}
  .pin .r{color:var(--accent-ink); font-weight:500; font-family:"Inter",sans-serif; font-size:12.5px; display:block; margin-top:2px}
  .pin .d{color:var(--muted); font-size:13px; line-height:1.45; margin:7px 0 0}
  .pin .more{margin-top:11px; font-size:12px; font-weight:600; color:var(--accent-ink);
    display:inline-flex; align-items:center; gap:5px}
  .pin.text{background:linear-gradient(180deg,#fff, #fffdfb)}
  .pin.quote{background:var(--accent-soft)}
  .pin.quote .t{color:var(--accent-ink)}
  .tags{margin-top:11px; display:flex; flex-wrap:wrap; gap:6px}
  .tag{font-size:10px; font-weight:700; letter-spacing:.03em; color:var(--accent-ink);
    background:var(--accent-soft); border-radius:999px; padding:4px 10px}

  .detail{display:none}

  /* modal */
  .scrim{position:fixed; inset:0; background:rgba(23,21,15,.55); backdrop-filter:blur(3px);
    display:none; align-items:flex-start; justify-content:center; padding:30px 16px; z-index:50; overflow:auto}
  .scrim.open{display:flex}
  .sheet{background:#fff; max-width:640px; width:100%; border-radius:22px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.35); animation:pop .22s ease}
  @keyframes pop{from{opacity:0; transform:translateY(14px) scale(.98)} to{opacity:1; transform:none}}
  .sheet img{width:100%; display:block}
  .sheet .m{padding:22px 24px 26px}
  .sheet h2{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:26px; margin:0}
  .sheet .role{color:var(--accent-ink); font-weight:500; font-size:14px; margin:4px 0 0}
  .sheet p{font-size:15px; line-height:1.6; color:#2c2820; margin:14px 0 0}
  .sheet ul{margin:12px 0 0; padding-left:18px}
  .sheet li{font-size:14.5px; line-height:1.55; color:#2c2820; margin:6px 0}
  .close{position:sticky; top:14px; float:right; margin:14px 14px -40px 0; z-index:2;
    width:36px; height:36px; border-radius:999px; border:none; cursor:pointer;
    background:rgba(255,255,255,.9); box-shadow:0 2px 8px rgba(0,0,0,.2); font-size:18px; line-height:1}
  .close:hover{background:#fff}
  footer{margin:44px 6px 0; color:var(--muted); font-size:12.5px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>

          <h2>RoloScan</h2>
          <div class="role">Product Manager, year-long practicum &middot; Aug 2025 to May 2026</div>
          <p>RoloScan is an AI networking app. For a year I was its product manager, working between a four-person student team, the founders, and faculty advisors. I owned the product end to end.</p>
          <p>When a survey was not telling me enough about how people actually used it, I built the room where the real behavior would happen: a live in-class networking simulation with 90 students, 70 from the analytics program and 20 from the MBA. I watched, then analyzed the qualitative and quantitative feedback in Python.</p>
          <p>The data surfaced a user segment the founders had never planned for. It changed what they built next. I presented usage dashboards broken down by region, device, and company, and the roadmap moved because of what we found.</p>

    <button class="pin text">
      <div class="c">
        <p class="t">Why I want product</p>
        <p class="d">The honest version of my pivot from consulting.</p>
        <span class="more">Read &#8250;</span>
      </div>
      <div class="detail">
        <div class="m">
          <h2>Why I want product</h2>
          <p>For four years companies brought me in to learn their business quickly, find what was not working, and tell them what to do next. I got good at the diagnosis. What I never got was the part that comes after: staying to build the fix and watching it change something real.</p>
          <p>RoloScan is where that gap became obvious. I was not analyzing someone else's product from the outside, I was responsible for it, and seeing a roadmap move because of something I noticed was the most useful I have felt in my career.</p>
          <p>I am honest that I have never held the PM title full time. I would rather learn the craft properly, with real ownership and a mentor, than pretend I already have it.</p>
        </div>
      </div>

          <h2>JobMatch AI</h2>
          <div class="role">Personal build &middot; 2 weeks</div>
          <p>A job recommendation system I built end to end in a two-week sprint. A Kafka pipeline ingests tens of thousands of live listings and feeds a three-stage ML ranker: vector search, hard filters, and a weighted scorer.</p>
          <p>The part I like most is the personalization layer. It re-weights the scoring signals based on which jobs you accept or reject, so the recommendations get more relevant the more you use it. Building a rough version taught me how hard the products that do this well make it look.</p>

<script>
  // ----- balanced masonry: place each pin in the shortest column -----
  var board=document.getElementById('board');
  var allPins=Array.prototype.slice.call(board.querySelectorAll('.pin'));
  function colCount(){ var w=window.innerWidth; return w<=520?1 : w<=820?2 : 3; }
  function layout(){
    var n=colCount();
    if(board.dataset.cols==String(n) && board.querySelector('.col')) return;
    board.dataset.cols=String(n);
    board.innerHTML='';
    var cols=[], heights=[];
    for(var i=0;i<n;i++){ var c=document.createElement('div'); c.className='col'; board.appendChild(c); cols.push(c); heights.push(0); }
    allPins.forEach(function(pin){
      var idx=0; for(var j=1;j<n;j++){ if(heights[j]<heights[idx]) idx=j; }
      cols[idx].appendChild(pin);
      heights[idx]=cols[idx].offsetHeight;
    });
  }
  function relayout(){ board.dataset.cols=''; layout(); }
  window.addEventListener('load', relayout);
  layout();
  var rt; window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(relayout,150); });

  // ----- modal -----
  var scrim=document.getElementById('scrim'), sbody=document.getElementById('sheetBody'),
      closeBtn=document.getElementById('close'), lastFocus=null;
  function openPin(pin){
    var d=pin.querySelector('.detail'); if(!d) return;
    sbody.innerHTML=d.innerHTML;
    scrim.classList.add('open'); document.body.style.overflow='hidden';
    lastFocus=pin; closeBtn.focus();
  }
  function closePin(){
    scrim.classList.remove('open'); document.body.style.overflow='';
    if(lastFocus) lastFocus.focus();
  }
  allPins.forEach(function(p){ p.addEventListener('click', function(){ openPin(p); }); });
  closeBtn.addEventListener('click', closePin);
  scrim.addEventListener('click', function(e){ if(e.target===scrim) closePin(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && scrim.classList.contains('open')) closePin(); });
</script>
